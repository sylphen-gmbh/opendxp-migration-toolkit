# Override built-in defaults. Unspecified keys keep script defaults.

scan_paths:
  - templates
  - public/static/css
  - src
  - config
  - bin            # bin/console (no .php extension -> see bootstrap group)
  - public/index.php

exclude_globs:
  - vendor/**
  - var/**
  - node_modules/**
  - web/js/fos_js_routes.js
  - "**/fos_js_routes.js"
  - src/Migrations/**
  - "**/ckeditor-plugins/**"
  # Contains the literal needle 'Pimcore\' on purpose (it is the version-file
  # migration command) - must not be rewritten by a rename run.
  - "**/MigrateVersionFilesCommand.php"

manual_review_substrings:
  - Pimcore-Schulung
  - demo.pimcore.org
  - pimcore.com
  - pimcore.org

directory_renames:
  - from: src/Resources/config/pimcore
    to: src/Resources/config/opendxp
  - from: config/pimcore
    to: config/opendxp
  - from: src/Resources/public/pimcore
    to: src/Resources/public/opendxp

audit_patterns:
  - name: twig-functions
    pattern: '\bpimcore_[a-zA-Z0-9_]+'
  - name: php-namespace
    pattern: '\bPimcore\\'
  - name: php-constants
    pattern: '\bPIMCORE_[A-Z0-9_]+'
  - name: config-blocks
    pattern: '\bpimcore_[a-zA-Z0-9_-]+:'
  - name: css-area-classes
    pattern: '\bpimcore_area_[a-zA-Z0-9_-]+'
  - name: css-tag-classes
    pattern: '\bpimcore_tag_[a-zA-Z0-9_-]+'
  - name: css-wysiwyg-class
    pattern: '\bpimcore_wysiwyg\b'
  - name: commands
    pattern: '\bpimcore:[a-zA-Z0-9:-]+'
  - name: js-global
    pattern: '\bpimcore\.[a-zA-Z]'
  - name: config-path
    pattern: '(?:^|["''])(?:src/Resources/)?config/pimcore(?:/|["'']|$)'
  - name: portal-layout
    pattern: '\bpimcore\.layout\.'

area_class_sources:
  templates_glob: "**/*.twig"
  template_pattern: '\bopendxp_area_[a-zA-Z0-9_-]+'
  css_glob: "**/*.css"
  css_patterns:
    - '\bopendxp_area_[a-zA-Z0-9_-]+'
    - '\bpimcore_area_[a-zA-Z0-9_-]+'

replacement_groups:
  - name: twig
    globs:
      - "**/*.twig"
    rules:
      - from: 'Pimcore\'
        to: 'OpenDxp\'
      - from: pimcore_
        to: opendxp_

  - name: css
    globs:
      - "**/*.css"
    rules:
      - from: pimcore_area_
        to: opendxp_area_
      - from: pimcore_tag_
        to: opendxp_editable_
      - from: pimcore_wysiwyg
        to: opendxp_editable_wysiwyg

  - name: php
    globs:
      - "**/*.php"
    rules:
      - from: Pimcore\
        to: OpenDxp\
      - from: PIMCORE_
        to: OPENDXP_

  - name: yaml
    globs:
      - "**/*.yaml"
      - "**/*.yml"
    rules:
      - from: 'Pimcore\'
        to: 'OpenDxp\'
      - from: '@Pimcore'
        to: '@OpenDxp'
      - from: pimcore_
        to: opendxp_
      - from: 'pimcore.'
        to: 'opendxp.'
      - from: 'pimcore:'
        to: 'opendxp:'

  - name: js
    globs:
      - "**/*.js"
    rules:
      - from: pimcore.layout.portlets.
        to: opendxp.layout.portlets.
      - from: pimcore.layout.
        to: opendxp.layout.
      - from: pimcore.document
        to: opendxp.document
      - from: pimcore.object
        to: opendxp.object
      - from: typeof pimcore
        to: typeof opendxp
      - from: pimcore.
        to: opendxp.

  - name: paths
    globs:
      - "**/*"
    rules:
      - from: pimcore.layout.portlets.
        to: opendxp.layout.portlets.
      - from: pimcore.layout.
        to: opendxp.layout.
      - from: src/Resources/config/pimcore/
        to: src/Resources/config/opendxp/
      - from: src/Resources/config/pimcore
        to: src/Resources/config/opendxp
      - from: config/pimcore/
        to: config/opendxp/
      - from: config/pimcore
        to: config/opendxp
      - from: src/Resources/public/pimcore/
        to: src/Resources/public/opendxp/
      - from: src/Resources/public/pimcore
        to: src/Resources/public/opendxp
      - from: /bundles/app/pimcore/
        to: /bundles/app/opendxp/
      - from: /bundles/pimcoreadmin/
        to: /bundles/opendxpadmin/
      - from: /bundles/pimcore/
        to: /bundles/opendxp/

  # Bundle/Kernel class names: turn the suffix "PimcoreXxxBundle" / "PimcoreKernel"
  # / "AbstractPimcoreBundle" into "OpenDxp...". Runs after the php group, which has
  # already converted the "Pimcore\" namespace prefix.
  - name: bundle-classes
    globs:
      - "config/bundles.php"
      - "src/Kernel.php"
      - "src/App.php"
    rules:
      - from: Pimcore
        to: OpenDxp

  # Bootstrap entrypoints. bin/console has NO ".php" extension, so the php group
  # (glob **/*.php) never matches it -> handle both explicitly here.
  # Note: a pure rename keeps project-specific tweaks but may leave deprecated bits
  # (e.g. a "Symfony\Component\Debug\Debug" import); compare against the OpenDXP
  # skeleton if in doubt.
  - name: bootstrap
    globs:
      - "bin/console"
      - "public/index.php"
    rules:
      - from: 'Pimcore\'
        to: 'OpenDxp\'
      - from: PIMCORE_
        to: OPENDXP_
